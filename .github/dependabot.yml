# Dependabot — automatic dependency vulnerability detection
# Creates PRs when vulnerable packages are found
# Checks npm + GitHub Actions weekly

version: 2
updates:
  # npm packages
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Moscow"
    # Security updates only (no version bumps)
    open-pull-requests-limit: 10
    labels:
      - "security"
      - "dependencies"
    commit-message:
      prefix: "fix(deps):"
    # Group minor/patch updates together
    groups:
      production-deps:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    # Ignore major version bumps for packages with breaking changes
    ignore:
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "security"
      - "ci"
    commit-message:
      prefix: "ci(deps):"
